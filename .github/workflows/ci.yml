name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Cancel older in-flight runs on the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Unit tests (always run) ───────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Cache fastembed model
        # fastembed downloads a ~22 MB ONNX model on first use; cache it so subsequent
        # CI runs don't re-download. Key includes the model name so swaps invalidate.
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5-${{ runner.os }}

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── 2. Eval gate (opt-in via secret) ────────────────────────────────────────
  # Eval cases hit the Anthropic API and cost real money per run, so this job
  # is intentionally gated: it only runs when the ANTHROPIC_API_KEY secret is
  # configured on the repository. Until then, the unit test job is the CI
  # signal. Once the user verifies the repaired eval framework end-to-end,
  # set the secret and this job activates automatically.
  evals:
    name: eval gate (opt-in)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Check if eval secret is configured
        id: secret_check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not configured — skipping eval gate."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secret_check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.secret_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.secret_check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache fastembed model
        if: steps.secret_check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5-${{ runner.os }}

      - name: Run eval suite
        if: steps.secret_check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Default model for the gate — override per-branch via CLAUDE_MODEL secret if you
          # want a cheaper model for CI than for production.
          CLAUDE_MODEL: ${{ secrets.CI_CLAUDE_MODEL || 'claude-haiku-4-5-20251001' }}
        run: |
          python -m evals.run_evals --output eval_results.json

      - name: Upload eval results artifact
        if: steps.secret_check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval_results.json
          retention-days: 30

      - name: Enforce thresholds
        if: steps.secret_check.outputs.skip == 'false'
        run: |
          python - <<'PY'
          import json, sys
          with open("eval_results.json") as f:
              report = json.load(f)
          metrics = report.get("metrics", {})
          summary = report.get("summary", {})

          pass_rate          = summary.get("pass_rate", 0.0)
          hallucination_rate = metrics.get("hallucination_rate", 1.0)
          turn_efficiency    = metrics.get("turn_efficiency", 99.0)

          # Conservative gates — tune once a baseline is established. The
          # hallucination gate is the only hard one: a confirmed order with a
          # fabricated item id is a real correctness regression.
          MIN_PASS_RATE          = 0.90
          MAX_HALLUCINATION_RATE = 0.00
          MAX_TURN_EFFICIENCY    = 1.50

          failures = []
          if pass_rate < MIN_PASS_RATE:
              failures.append(f"pass_rate {pass_rate:.2%} < {MIN_PASS_RATE:.0%}")
          if hallucination_rate > MAX_HALLUCINATION_RATE:
              failures.append(f"hallucination_rate {hallucination_rate:.2%} > {MAX_HALLUCINATION_RATE:.0%}")
          if turn_efficiency > MAX_TURN_EFFICIENCY:
              failures.append(f"turn_efficiency {turn_efficiency:.2f}x > {MAX_TURN_EFFICIENCY:.2f}x")

          print(f"pass_rate          : {pass_rate:.2%}")
          print(f"hallucination_rate : {hallucination_rate:.2%}")
          print(f"turn_efficiency    : {turn_efficiency:.2f}x")

          if failures:
              print()
              print("Eval gate FAILED:")
              for f in failures:
                  print("  -", f)
              sys.exit(1)
          PY
